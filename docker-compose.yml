version: "3.8"

services:
  database:
    image: mysql:8.0
    container_name: fatloss-db
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass123}
      MYSQL_DATABASE: ${DB_NAME:-fatloss_pk}
      MYSQL_USER: ${DB_USER:-fatloss}
      MYSQL_PASSWORD: ${DB_PASSWORD:-fatloss123}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: fatloss-backend
    env_file: .env
    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_USER: ${DB_USER:-fatloss}
      DB_PASSWORD: ${DB_PASSWORD:-fatloss123}
      DB_NAME: ${DB_NAME:-fatloss_pk}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://yoyo678.cc.cd,https://yoyo678.cc.cd}
      OFF_API_URL: https://world.openfoodfacts.org
      SMTP_HOST: ${SMTP_HOST:-smtp.qq.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    command: >
      sh -c "python -m app.init_db &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    container_name: fatloss-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
  uploads:
